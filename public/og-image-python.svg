<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Left accent bar (Python blue → yellow) -->
  <rect x="80" y="180" width="4" height="270" fill="url(#accent)" rx="2"/>

  <!-- Python wordmark chip -->
  <rect x="80" y="115" width="80" height="32" rx="6" fill="#3b82f6" fill-opacity="0.15"/>
  <text x="120" y="136" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">Python</text>

  <!-- Main title -->
  <text x="108" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">Intentional</text>
  <text x="108" y="322" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="#3b82f6" letter-spacing="-2">Code</text>

  <!-- Divider -->
  <rect x="108" y="354" width="520" height="1.5" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Descriptor -->
  <text x="108" y="396" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#9ca3af" letter-spacing="0.2">
    The 22 Gang-of-Four patterns, written for Python.
  </text>
  <text x="108" y="428" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#9ca3af" letter-spacing="0.2">
    Idiomatic. Honest. No Java in disguise.
  </text>

  <!-- Bottom domain -->
  <text x="108" y="530" font-family="'Courier New', monospace" font-size="16" fill="#4b5563">intentionalcode.com</text>

  <!-- Decorative code snippet (right side) -->
  <g opacity="0.18">
    <text x="720" y="200" font-family="'Courier New', monospace" font-size="15" fill="#facc15">from abc import ABC, abstractmethod</text>
    <text x="720" y="232" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af"> </text>
    <text x="720" y="256" font-family="'Courier New', monospace" font-size="15" fill="#3b82f6">class Discount(ABC):</text>
    <text x="720" y="280" font-family="'Courier New', monospace" font-size="15" fill="#facc15">    @abstractmethod</text>
    <text x="720" y="304" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af">    def apply(self, total: float)</text>
    <text x="720" y="328" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af">             -> float: ...</text>
    <text x="720" y="368" font-family="'Courier New', monospace" font-size="15" fill="#3b82f6">class Percentage(Discount):</text>
    <text x="720" y="392" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af">    def apply(self, total):</text>
    <text x="720" y="416" font-family="'Courier New', monospace" font-size="15" fill="#4ade80">        return total * 0.9</text>
  </g>
</svg>
