<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b42bc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="270" fill="url(#accent)" rx="2"/>

  <!-- Terraform wordmark chip -->
  <rect x="80" y="115" width="104" height="32" rx="6" fill="#7b42bc" fill-opacity="0.15"/>
  <text x="132" y="136" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#a855f7" text-anchor="middle">Terraform</text>

  <!-- Main title -->
  <text x="108" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">Intentional</text>
  <text x="108" y="322" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="#a855f7" letter-spacing="-2">Code</text>

  <!-- Divider -->
  <rect x="108" y="354" width="520" height="1.5" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Descriptor -->
  <text x="108" y="396" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#9ca3af" letter-spacing="0.2">
    Infrastructure patterns, written for Terraform.
  </text>
  <text x="108" y="428" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#9ca3af" letter-spacing="0.2">
    Modules, composition, and design philosophy.
  </text>

  <!-- Bottom domain -->
  <text x="108" y="530" font-family="'Courier New', monospace" font-size="16" fill="#4b5563">intentionalcode.com</text>

  <!-- Decorative HCL snippet (right side) -->
  <g opacity="0.18">
    <text x="720" y="200" font-family="'Courier New', monospace" font-size="15" fill="#a855f7">module "vpc" {</text>
    <text x="720" y="224" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af">  source = "./modules/vpc"</text>
    <text x="720" y="248" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af">  </text>
    <text x="720" y="272" font-family="'Courier New', monospace" font-size="15" fill="#4ade80">  cidr_block = var.vpc_cidr</text>
    <text x="720" y="296" font-family="'Courier New', monospace" font-size="15" fill="#4ade80">  tags       = var.common_tags</text>
    <text x="720" y="320" font-family="'Courier New', monospace" font-size="15" fill="#a855f7">}</text>
    <text x="720" y="360" font-family="'Courier New', monospace" font-size="15" fill="#a855f7">resource "aws_instance" "web" {</text>
    <text x="720" y="384" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af">  ami           = data.aws_ami.ubuntu.id</text>
    <text x="720" y="408" font-family="'Courier New', monospace" font-size="15" fill="#9ca3af">  instance_type = var.instance_type</text>
    <text x="720" y="432" font-family="'Courier New', monospace" font-size="15" fill="#4ade80">  tags = { Name = local.name }</text>
    <text x="720" y="456" font-family="'Courier New', monospace" font-size="15" fill="#a855f7">}</text>
  </g>
</svg>
