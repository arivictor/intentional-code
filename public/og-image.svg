  <text x="698" y="220" font-family="'Courier New',monospace" font-size="18"><tspan fill="#7c3aed">type </tspan><tspan fill="#1d4ed8">EventBus </tspan><tspan fill="#7c3aed">struct </tspan><tspan fill="#1a1a1a">{</tspan></text>

  <text x="680" y="250" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">06</text>
