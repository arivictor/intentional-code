<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#000000" opacity="0.04"/>
    </pattern>
    <filter id="blob1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blob2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="75"/>
    </filter>
    <!-- Fades gradient away from text -->
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="38%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="62%"  stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- ── COLOR GRADIENT (upper-right) ── -->
  <ellipse cx="960" cy="360" rx="360" ry="290" fill="#00d4aa" opacity="0.55" filter="url(#blob1)"/>
  <ellipse cx="1100" cy="100" rx="270" ry="220" fill="#ff4444" opacity="0.62" filter="url(#blob1)"/>
  <ellipse cx="1020" cy="220" rx="220" ry="175" fill="#ff8800" opacity="0.45" filter="url(#blob2)"/>
  <ellipse cx="860"  cy="500" rx="210" ry="165" fill="#0fd4bf" opacity="0.35" filter="url(#blob2)"/>

  <!-- ── FADE OVERLAYS ── -->
  <rect width="1200" height="630" fill="url(#fadeLeft)"/>
  <rect width="1200" height="160" fill="url(#fadeTop)"/>

  <!-- ── CORNER CROSSHAIRS ── -->
  <line x1="18" y1="30" x2="42" y2="30" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="30" y1="18" x2="30" y2="42" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1158" y1="30" x2="1182" y2="30" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1170" y1="18" x2="1170" y2="42" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="18"   y1="600" x2="42"   y2="600" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="30"   y1="588" x2="30"   y2="612" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1158" y1="600" x2="1182" y2="600" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1170" y1="588" x2="1170" y2="612" stroke="#d4d4d4" stroke-width="1"/>

  <!-- ── BRAND MARK ── -->
  <!-- <text x="80" y="86"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="14" font-weight="600" letter-spacing="-0.2" fill="#000000">Intentional Code</text>
  <text x="219" y="86"
        font-family="'Courier New', Courier, monospace"
