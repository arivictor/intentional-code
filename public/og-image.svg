  <!-- ── MAIN HEADLINE ── -->
  <text x="80" y="270"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="104" font-weight="800" letter-spacing="-5"
        fill="#000000">Intentional</text>
  <text x="80" y="382"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="104" font-weight="800" letter-spacing="-5"
        fill="#000000">Code.</text>

  <!-- ── CODE PANEL — zoomed in, bleeds past right + bottom edges ── -->
