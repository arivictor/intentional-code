  <text x="698" y="610" font-family="'Courier New',monospace" font-size="18"><tspan fill="#7c3aed">func </tspan><tspan fill="#1a1a1a">(b *</tspan><tspan fill="#1d4ed8">EventBus</tspan><tspan fill="#1a1a1a">) </tspan><tspan fill="#059669">Subscribe</tspan><tspan fill="#1a1a1a">(observer </tspan><tspan fill="#1d4ed8">Observer</tspan><tspan fill="#1a1a1a">) {</tspan></text>
