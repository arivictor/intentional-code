<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#000000" opacity="0.05"/>
    </pattern>
    <!-- Soft blur for the brand-color halo behind the logo -->
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <!-- Drop shadow that lifts the logo tile off the page -->
    <filter id="tileShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- ── BRAND-COLOR HALO (glows around the logo) ── -->
  <g filter="url(#soft)" opacity="0.45">
    <ellipse cx="528" cy="190" rx="150" ry="130" fill="#00d4aa"/>
    <ellipse cx="676" cy="196" rx="150" ry="130" fill="#ff8800"/>
    <ellipse cx="604" cy="312" rx="160" ry="120" fill="#ff4444"/>
  </g>

  <!-- ── CORNER CROSSHAIRS ── -->
  <line x1="18"   y1="30"  x2="42"   y2="30"  stroke="#d4d4d4" stroke-width="1"/>
  <line x1="30"   y1="18"  x2="30"   y2="42"  stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1158" y1="30"  x2="1182" y2="30"  stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1170" y1="18"  x2="1170" y2="42"  stroke="#d4d4d4" stroke-width="1"/>
  <line x1="18"   y1="600" x2="42"   y2="600" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="30"   y1="588" x2="30"   y2="612" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1158" y1="600" x2="1182" y2="600" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1170" y1="588" x2="1170" y2="612" stroke="#d4d4d4" stroke-width="1"/>

  <!-- ── LOGO MARK — the ">" in a rounded square ── -->
  <g filter="url(#tileShadow)">
    <rect x="500" y="140" width="200" height="200" rx="46" fill="#0a0a0a"/>
  </g>
  <polyline points="576,192 632,240 576,288"
            fill="none" stroke="#ffffff" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── WORDMARK ── -->
  <text x="600" y="462" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="70" font-weight="800" letter-spacing="-3" fill="#0a0a0a">Intentional Code<tspan font-family="'Courier New', Courier, monospace" font-weight="700" fill="#0a0a0a">_</tspan></text>

  <!-- ── TAGLINE ── -->
  <text x="600" y="516" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="27" font-weight="500" letter-spacing="-0.3" fill="#525252">Patterns &amp; principles for writing intentional Go.</text>

  <!-- ── DOMAIN ── -->
  <text x="600" y="586" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="19" font-weight="400" letter-spacing="1.5" fill="#a3a3a3">intentionalcode.com</text>
</svg>
