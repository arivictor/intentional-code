  <text x="680" y="100" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">01</text>
  <text x="698" y="100" font-family="'Courier New',monospace" font-size="18"><tspan fill="#7c3aed">type </tspan><tspan fill="#1d4ed8">Observer </tspan><tspan fill="#7c3aed">interface </tspan><tspan fill="#1a1a1a">{</tspan></text>

