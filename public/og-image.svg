  <text x="698" y="280" font-family="'Courier New',monospace" font-size="18"><tspan fill="#1a1a1a">    observers   []</tspan><tspan fill="#1d4ed8">Observer</tspan></text>

  <text x="680" y="310" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">08</text>
  <text x="698" y="310" font-family="'Courier New',monospace" font-size="18"><tspan fill="#1a1a1a">    middlewares []</tspan><tspan fill="#1d4ed8">MiddlewareFn</tspan></text>

  <text x="680" y="340" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">09</text>
  <text x="698" y="340" font-family="'Courier New',monospace" font-size="18" fill="#1a1a1a">}</text>

  <text x="680" y="370" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">10</text>

  <text x="680" y="400" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">11</text>
  <text x="698" y="400" font-family="'Courier New',monospace" font-size="18"><tspan fill="#7c3aed">func </tspan><tspan fill="#1a1a1a">(b *</tspan><tspan fill="#1d4ed8">EventBus</tspan><tspan fill="#1a1a1a">) </tspan><tspan fill="#059669">Publish</tspan><tspan fill="#1a1a1a">(event </tspan><tspan fill="#1d4ed8">Event</tspan><tspan fill="#1a1a1a">, opts ...</tspan><tspan fill="#1d4ed8">Option</tspan><tspan fill="#1a1a1a">) {</tspan></text>

  <text x="680" y="430" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">12</text>
  <text x="698" y="430" font-family="'Courier New',monospace" font-size="18"><tspan fill="#1a1a1a">    b.mu.</tspan><tspan fill="#059669">RLock</tspan><tspan fill="#1a1a1a">()</tspan></text>

  <text x="680" y="460" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">13</text>
  <text x="698" y="460" font-family="'Courier New',monospace" font-size="18"><tspan fill="#7c3aed">    defer </tspan><tspan fill="#1a1a1a">b.mu.</tspan><tspan fill="#059669">RUnlock</tspan><tspan fill="#1a1a1a">()</tspan></text>

  <text x="680" y="490" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">14</text>
  <text x="698" y="490" font-family="'Courier New',monospace" font-size="18"><tspan fill="#7c3aed">    for </tspan><tspan fill="#1a1a1a">_, observer := </tspan><tspan fill="#7c3aed">range </tspan><tspan fill="#1a1a1a">b.observers {</tspan></text>

  <!-- Active line highlight -->
  <rect x="648" y="499" width="732" height="30" fill="#000000" fill-opacity="0.03"/>

  <text x="680" y="520" font-family="'Courier New',monospace" font-size="13" fill="#c4c4c4" text-anchor="end">15</text>
  <text x="698" y="520" font-family="'Courier New',monospace" font-size="18"><tspan fill="#1a1a1a">        observer.</tspan><tspan fill="#059669">Update</tspan><tspan fill="#1a1a1a">(event)</tspan></text>

  <text x="680" y="550" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">16</text>
  <text x="698" y="550" font-family="'Courier New',monospace" font-size="18" fill="#1a1a1a">    }</text>

  <text x="680" y="580" font-family="'Courier New',monospace" font-size="13" fill="#d8d8d8" text-anchor="end">17</text>
  <text x="698" y="580" font-family="'Courier New',monospace" font-size="18" fill="#1a1a1a">}</text>

