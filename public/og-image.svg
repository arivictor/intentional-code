<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="#000000" opacity="0.04"/>
    </pattern>

    <filter id="blob1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blob2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="75"/>
    </filter>

    <!-- Fades text area back to clean white -->
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="42%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="68%"  stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Softens gradient at very top -->
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- ── COLOR GRADIENT (upper-right) ── -->
  <!-- Teal / mint -->
  <ellipse cx="950" cy="370" rx="360" ry="280" fill="#00d4aa" opacity="0.55" filter="url(#blob1)"/>
  <!-- Red / coral -->
  <ellipse cx="1090" cy="110" rx="260" ry="210" fill="#ff4444" opacity="0.60" filter="url(#blob1)"/>
  <!-- Orange -->
  <ellipse cx="1010" cy="230" rx="210" ry="170" fill="#ff8800" opacity="0.45" filter="url(#blob2)"/>
  <!-- Extra teal lower -->
  <ellipse cx="850"  cy="490" rx="200" ry="160" fill="#0fd4bf" opacity="0.35" filter="url(#blob2)"/>

  <!-- ── FADE OVERLAYS ── -->
  <rect width="1200" height="630" fill="url(#fadeLeft)"/>
  <rect width="1200" height="160" fill="url(#fadeTop)"/>

  <!-- ── CORNER CROSSHAIRS ── -->
  <line x1="18" y1="30" x2="42" y2="30" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="30" y1="18" x2="30" y2="42" stroke="#d4d4d4" stroke-width="1"/>

  <line x1="1158" y1="30" x2="1182" y2="30" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1170" y1="18" x2="1170" y2="42" stroke="#d4d4d4" stroke-width="1"/>

  <line x1="18" y1="600" x2="42" y2="600" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="30" y1="588" x2="30" y2="612" stroke="#d4d4d4" stroke-width="1"/>

  <line x1="1158" y1="600" x2="1182" y2="600" stroke="#d4d4d4" stroke-width="1"/>
  <line x1="1170" y1="588" x2="1170" y2="612" stroke="#d4d4d4" stroke-width="1"/>

  <!-- ── BRAND ── -->
  <text x="80" y="102"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="15" font-weight="600" letter-spacing="-0.2" fill="#000000">Intentional Code</text>
  <text x="231" y="102"
        font-family="'Courier New', Courier, monospace"
        font-size="15" font-weight="700" fill="#000000">_</text>

  <!-- Language chip -->
  <rect x="80" y="116" width="38" height="20" rx="4" fill="none" stroke="#e5e5e5" stroke-width="1"/>
  <text x="99" y="130"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
        font-size="10" font-weight="600" fill="#737373" text-anchor="middle">Go</text>

  <!-- ── MAIN HEADLINE ── -->
  <text x="80" y="254"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="88" font-weight="800" letter-spacing="-4"
        fill="#000000">Intentional</text>
  <text x="80" y="348"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="88" font-weight="800" letter-spacing="-4"
        fill="#000000">Code.</text>

  <!-- Divider -->
  <rect x="80" y="372" width="510" height="1" fill="#e5e5e5"/>

  <!-- ── TAGLINE ── -->
  <text x="80" y="407"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
        font-size="17" font-weight="400" fill="#737373" letter-spacing="0.1">
    Patterns &amp; principles for production Go
  </text>

  <!-- ── PATTERN CHIPS (light mode) ── -->
  <rect x="80"  y="436" width="83"  height="23" rx="4" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="122" y="452" font-family="'Courier New', Courier, monospace" font-size="11" fill="#737373" text-anchor="middle">Observer</text>

  <rect x="173" y="436" width="93"  height="23" rx="4" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="220" y="452" font-family="'Courier New', Courier, monospace" font-size="11" fill="#737373" text-anchor="middle">Decorator</text>

  <rect x="276" y="436" width="74"  height="23" rx="4" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="313" y="452" font-family="'Courier New', Courier, monospace" font-size="11" fill="#737373" text-anchor="middle">Factory</text>

  <rect x="360" y="436" width="78"  height="23" rx="4" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="399" y="452" font-family="'Courier New', Courier, monospace" font-size="11" fill="#737373" text-anchor="middle">Strategy</text>

  <rect x="448" y="436" width="74"  height="23" rx="4" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="485" y="452" font-family="'Courier New', Courier, monospace" font-size="11" fill="#737373" text-anchor="middle">Adapter</text>

  <!-- ── DOMAIN ── -->
  <text x="80" y="578"
        font-family="'Courier New', Courier, monospace"
        font-size="13" fill="#a3a3a3">intentionalcode.com</text>

  <!-- ── CODE BLOCK (light mode) ── -->
  <rect x="700" y="58" width="440" height="514" rx="12" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Header -->
  <rect x="700" y="58"  width="440" height="44" rx="12" fill="#f0f0f0"/>
  <rect x="700" y="90"  width="440" height="12"  fill="#f0f0f0"/>
  <rect x="700" y="101" width="440" height="1"   fill="#e5e5e5"/>

  <!-- Window dots (muted) -->
  <circle cx="726" cy="80" r="5" fill="#d4d4d4"/>
  <circle cx="744" cy="80" r="5" fill="#d4d4d4"/>
  <circle cx="762" cy="80" r="5" fill="#d4d4d4"/>

  <!-- File tab -->
  <rect x="784" y="66" width="106" height="26" rx="4" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="837" y="83" font-family="'Courier New', Courier, monospace" font-size="11" fill="#a3a3a3" text-anchor="middle">observer.go</text>

  <!-- ── CODE LINES ── line-height 22, start y=133
       keywords: #7c3aed  types: #1d4ed8  functions: #059669  comments: #9ca3af  default: #1a1a1a  nums: #d1d5db -->

  <!-- 01: type Observer interface { -->
  <text x="734" y="133" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">01</text>
  <text x="762" y="133" font-family="'Courier New', monospace" font-size="12"><tspan fill="#7c3aed">type </tspan><tspan fill="#1d4ed8">Observer </tspan><tspan fill="#7c3aed">interface </tspan><tspan fill="#1a1a1a">{</tspan></text>

  <!-- 02:     Update(event Event) -->
  <text x="734" y="155" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">02</text>
  <text x="762" y="155" font-family="'Courier New', monospace" font-size="12"><tspan fill="#059669">    Update</tspan><tspan fill="#1a1a1a">(event </tspan><tspan fill="#1d4ed8">Event</tspan><tspan fill="#1a1a1a">)</tspan></text>

  <!-- 03: } -->
  <text x="734" y="177" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">03</text>
  <text x="762" y="177" font-family="'Courier New', monospace" font-size="12" fill="#1a1a1a">}</text>

  <!-- 04: blank -->
  <text x="734" y="199" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">04</text>

  <!-- 05: // EventBus notifies registered observers -->
  <text x="734" y="221" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">05</text>
  <text x="762" y="221" font-family="'Courier New', monospace" font-size="12" fill="#9ca3af">// EventBus notifies registered observers</text>

  <!-- 06: type EventBus struct { -->
  <text x="734" y="243" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">06</text>
  <text x="762" y="243" font-family="'Courier New', monospace" font-size="12"><tspan fill="#7c3aed">type </tspan><tspan fill="#1d4ed8">EventBus </tspan><tspan fill="#7c3aed">struct </tspan><tspan fill="#1a1a1a">{</tspan></text>

  <!-- 07:     observers []Observer -->
  <text x="734" y="265" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">07</text>
  <text x="762" y="265" font-family="'Courier New', monospace" font-size="12"><tspan fill="#1a1a1a">    observers []</tspan><tspan fill="#1d4ed8">Observer</tspan></text>

  <!-- 08: } -->
  <text x="734" y="287" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">08</text>
  <text x="762" y="287" font-family="'Courier New', monospace" font-size="12" fill="#1a1a1a">}</text>

  <!-- 09: blank -->
  <text x="734" y="309" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">09</text>

  <!-- 10: func (b *EventBus) Publish(e Event) { -->
  <text x="734" y="331" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">10</text>
  <text x="762" y="331" font-family="'Courier New', monospace" font-size="12"><tspan fill="#7c3aed">func </tspan><tspan fill="#1a1a1a">(b *</tspan><tspan fill="#1d4ed8">EventBus</tspan><tspan fill="#1a1a1a">) </tspan><tspan fill="#059669">Publish</tspan><tspan fill="#1a1a1a">(e </tspan><tspan fill="#1d4ed8">Event</tspan><tspan fill="#1a1a1a">) {</tspan></text>

  <!-- 11:     for _, o := range b.observers { -->
  <text x="734" y="353" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">11</text>
  <text x="762" y="353" font-family="'Courier New', monospace" font-size="12"><tspan fill="#7c3aed">    for </tspan><tspan fill="#1a1a1a">_, o := </tspan><tspan fill="#7c3aed">range </tspan><tspan fill="#1a1a1a">b.observers {</tspan></text>

  <!-- Active line highlight -->
  <rect x="700" y="363" width="440" height="22" fill="#000000" fill-opacity="0.03"/>

  <!-- 12:         o.Update(e) -->
  <text x="734" y="378" font-family="'Courier New', monospace" font-size="12" fill="#c0c0c0">12</text>
  <text x="762" y="378" font-family="'Courier New', monospace" font-size="12"><tspan fill="#1a1a1a">        o.</tspan><tspan fill="#059669">Update</tspan><tspan fill="#1a1a1a">(e)</tspan></text>

  <!-- 13:     } -->
  <text x="734" y="400" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">13</text>
  <text x="762" y="400" font-family="'Courier New', monospace" font-size="12" fill="#1a1a1a">    }</text>

  <!-- 14: } -->
  <text x="734" y="422" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">14</text>
  <text x="762" y="422" font-family="'Courier New', monospace" font-size="12" fill="#1a1a1a">}</text>

  <!-- 15: blank -->
  <text x="734" y="444" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">15</text>

  <!-- 16: func (b *EventBus) Subscribe(o Observer) { -->
  <text x="734" y="466" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">16</text>
  <text x="762" y="466" font-family="'Courier New', monospace" font-size="12"><tspan fill="#7c3aed">func </tspan><tspan fill="#1a1a1a">(b *</tspan><tspan fill="#1d4ed8">EventBus</tspan><tspan fill="#1a1a1a">) </tspan><tspan fill="#059669">Subscribe</tspan><tspan fill="#1a1a1a">(o </tspan><tspan fill="#1d4ed8">Observer</tspan><tspan fill="#1a1a1a">) {</tspan></text>

  <!-- 17:     b.observers = append(b.observers, o) -->
  <text x="734" y="488" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">17</text>
  <text x="762" y="488" font-family="'Courier New', monospace" font-size="12"><tspan fill="#1a1a1a">    b.observers = </tspan><tspan fill="#059669">append</tspan><tspan fill="#1a1a1a">(b.observers, o)</tspan></text>

  <!-- 18: } -->
  <text x="734" y="510" font-family="'Courier New', monospace" font-size="12" fill="#d1d5db">18</text>
  <text x="762" y="510" font-family="'Courier New', monospace" font-size="12" fill="#1a1a1a">}</text>
</svg>
